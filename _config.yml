author: cnfeat
language: zh-CN
url: "https://cnfeat.com"
baseurl: ""

timezone: Asia/Shanghai

markdown: kramdown
highlighter: rouge

permalink: /:year/:month/:day/:title

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  
tracking_id: UA-80884545-1

# SEO 优化
twitter:
  username: cnfeat

# GitHub Pages 需要的配置
github:
  repository: cnfea/cnfeat.github.io

# 归档配置
collections:
